<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f8faf7">
    <title>からだログ</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Daily Body Log</p>
          <h1>からだログ</h1>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="設定を開く" title="設定">
          <span aria-hidden="true">⚙</span>
        </button>
      </header>

      <section class="summary-grid" aria-label="最新サマリー">
        <article class="metric-panel accent-weight">
          <span class="metric-label">最新体重</span>
          <strong id="latestWeight">--</strong>
          <small id="weightDelta">記録待ち</small>
        </article>
        <article class="metric-panel accent-fat">
          <span class="metric-label">最新体脂肪率</span>
          <strong id="latestFat">--</strong>
          <small id="fatDelta">記録待ち</small>
        </article>
      </section>

      <section class="input-panel" aria-labelledby="entryTitle">
        <div class="section-heading">
          <h2 id="entryTitle">今日の記録</h2>
          <button class="text-button" id="todayButton" type="button">今日</button>
        </div>
        <form id="entryForm" autocomplete="off">
          <label>
            <span>日付</span>
            <input id="dateInput" name="date" type="date" required>
          </label>
          <div class="field-row">
            <label>
              <span>体重 kg</span>
              <input id="weightInput" name="weight" type="number" min="20" max="300" step="0.1" inputmode="decimal" placeholder="62.4" required>
            </label>
            <label>
              <span>体脂肪率 %</span>
              <input id="fatInput" name="fat" type="number" min="1" max="80" step="0.1" inputmode="decimal" placeholder="22.5" required>
            </label>
          </div>
          <label>
            <span>メモ</span>
            <input id="noteInput" name="note" type="text" maxlength="80" placeholder="運動・食事・体調など">
          </label>
          <button class="primary-button" type="submit">記録する</button>
        </form>
      </section>

      <section class="chart-panel" aria-labelledby="chartTitle">
        <div class="section-heading">
          <h2 id="chartTitle">推移</h2>
          <div class="segmented" role="tablist" aria-label="表示期間">
            <button type="button" data-range="7" class="active">7日</button>
            <button type="button" data-range="14">14日</button>
            <button type="button" data-range="30">30日</button>
            <button type="button" data-range="all">全部</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="trendChart" width="720" height="360" aria-label="体重と体脂肪率の推移グラフ"></canvas>
        </div>
        <div class="legend" aria-hidden="true">
          <span><i class="dot weight-dot"></i>体重</span>
          <span><i class="dot average-dot"></i>14日平均</span>
          <span><i class="dot average-thirty-dot"></i>30日平均</span>
          <span><i class="dot fat-dot"></i>体脂肪率</span>
        </div>
      </section>

      <section class="insight-grid" aria-label="分析">
        <article>
          <span>7日平均</span>
          <strong id="avgSeven">--</strong>
        </article>
        <article>
          <span>14日平均</span>
          <strong id="avgFourteen">--</strong>
        </article>
        <article>
          <span>BMI</span>
          <strong id="bmiValue">--</strong>
        </article>
        <article>
          <span>記録日数</span>
          <strong id="recordCount">0日</strong>
        </article>
      </section>

      <section class="activity-grid" aria-label="活動量">
        <article>
          <span>最新歩数</span>
          <strong id="latestSteps">--</strong>
          <small id="avgSteps">7日平均 --</small>
        </article>
        <article>
          <span>最新消費カロリー</span>
          <strong id="latestCalories">--</strong>
          <small id="avgCalories">7日平均 --</small>
        </article>
      </section>

      <section class="history-panel" aria-labelledby="historyTitle">
        <div class="section-heading">
          <h2 id="historyTitle">履歴</h2>
          <div class="actions">
            <button class="mini-button" id="exportCsvButton" type="button" aria-label="CSVを書き出す" title="CSVを書き出す">CSV</button>
            <button class="mini-button" id="exportJsonButton" type="button" aria-label="JSONを書き出す" title="JSONを書き出す">JSON</button>
            <button class="icon-button" id="importButton" type="button" aria-label="取り込み用JSONを読み込む" title="取り込み用JSONを読み込む">⇧</button>
          </div>
        </div>
        <input id="importFile" type="file" accept="application/json" hidden>
        <div id="emptyState" class="empty-state">
          <strong>まだ記録がありません</strong>
          <span>まずは今日の体重と体脂肪率を入れてみましょう。</span>
        </div>
        <ul id="historyList" class="history-list" aria-live="polite"></ul>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="dialog-card">
        <div class="section-heading">
          <h2>設定</h2>
          <button class="icon-button" value="cancel" aria-label="閉じる" title="閉じる">×</button>
        </div>
        <label>
          <span>身長 cm</span>
          <input id="heightInput" type="number" min="100" max="230" step="0.1" inputmode="decimal" placeholder="165.0">
        </label>
        <div class="dialog-actions">
          <button class="text-button danger" id="clearButton" type="button">全データ削除</button>
          <button class="primary-button" id="saveSettingsButton" value="default">保存</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
